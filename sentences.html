<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日常会话 - 日语打字</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .coming-soon { text-align: center; padding: 40px; }
    .coming-soon .icon { font-size: 5rem; margin-bottom: 20px; animation: bounce 1s ease infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-15px);} }
    .coming-soon h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary); }
    .coming-soon p { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 30px; }
    .coming-soon a {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, var(--primary), #ff8787);
      color: white;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .coming-soon a:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(255,107,107,0.4); }
  </style>
</head>
<body>
  <div class="coming-soon">
    <div class="icon">💬</div>
    <h1>日常会话</h1>
    <p>常见日语句型罗马字输入，正在紧张开发中...</p>
    <a href="kana.html">先练五十音 →</a>
    <div style="margin-top:20px;">
      <a href="index.html" style="background:var(--card-bg);border:1px solid var(--border);color:var(--text-dim);">← 返回主页</a>
    </div>
  </div>
</body>
</html>
