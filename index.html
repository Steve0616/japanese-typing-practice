<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日语打字练习</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== 主页额外样式 ===== */

    /* Hero 区域 */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid var(--primary);
      border-radius: 20px;
      color: var(--primary);
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary), var(--warning));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    /* 全局模式切换 */
    .global-mode {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 25px 0;
    }

    .global-mode-btn {
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--card-bg);
      color: var(--text-dim);
      transition: all 0.2s;
      font-weight: 500;
    }

    .global-mode-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .global-mode-btn.active {
      background: linear-gradient(135deg, var(--primary), #ff8787);
      color: white;
      border-color: transparent;
    }

    /* 模块卡片网格 */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 30px 0;
    }

    .module-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: block;
    }

    .module-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--warning));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .module-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.15);
    }

    .module-card:hover::before {
      opacity: 1;
    }

    .module-card.locked {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .module-card.locked:hover {
      transform: none;
      border-color: var(--border);
      box-shadow: none;
    }

    .module-icon {
      font-size: 3rem;
      margin-bottom: 15px;
      display: block;
    }

    .module-name {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 8px;
      color: var(--text);
    }

    .module-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 15px;
      min-height: 40px;
    }

    .module-progress-ring {
      width: 80px;
      height: 80px;
      margin: 0 auto 10px;
      position: relative;
    }

    .module-progress-ring svg {
      transform: rotate(-90deg);
    }

    .module-progress-ring circle {
      fill: none;
      stroke-width: 6;
    }

    .module-progress-ring .bg {
      stroke: var(--border);
    }

    .module-progress-ring .fill {
      stroke: var(--primary);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s ease;
    }

    .module-progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--primary);
    }

    .module-status {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .module-status.done {
      color: var(--success);
    }

    /* 总体进度 */
    .overall-progress {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 25px 30px;
      margin-top: 30px;
    }

    .overall-progress h3 {
      font-size: 1rem;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .overall-bar {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .overall-bar .progress-bar {
      flex: 1;
    }

    .overall-percent {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary);
      min-width: 60px;
      text-align: right;
    }

    /* 底部 */
    .footer {
      text-align: center;
      padding: 30px 0;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* 响应式 */
    @media (max-width: 700px) {
      .hero h1 { font-size: 2rem; }
      .modules-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部导航 -->
    <div class="nav">
      <div class="logo">日语打字</div>
      <div class="nav-controls">
        <a href="kana.html" class="nav-link">五十音</a>
        <a href="words.html" class="nav-link">常用词</a>
        <a href="sentences.html" class="nav-link">常用句</a>
      </div>
    </div>

    <!-- Hero -->
    <div class="hero">
      <span class="hero-badge">日语学习第一步</span>
      <h1>日语打字练习</h1>
      <p>掌握发音系统 · 学习常用词汇 · 练习日常表达</p>

      <!-- 全局模式切换 -->
      <div class="global-mode">
        <button class="global-mode-btn active" id="btnBeginner" onclick="setGlobalMode('beginner')">
          🔰 入门模式
        </button>
        <button class="global-mode-btn" id="btnAdvanced" onclick="setGlobalMode('advanced')">
          🈶 进阶模式
        </button>
      </div>
    </div>

    <!-- 模块卡片 -->
    <div class="modules-grid">
      <!-- 五十音 -->
      <a href="kana.html" class="module-card" id="cardKana">
        <span class="module-icon">あ</span>
        <div class="module-name">五十音图</div>
        <div class="module-desc">掌握清音·浊音·拗音·促音的罗马字输入</div>
        <div class="module-progress-ring" id="ringKana">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="bg" cx="40" cy="40" r="34"/>
            <circle class="fill" cx="40" cy="40" r="34"
              stroke-dasharray="213.6"
              stroke-dashoffset="213.6"
              id="ringKanaCircle"/>
          </svg>
          <span class="module-progress-text" id="textKanaPct">0%</span>
        </div>
        <div class="module-status" id="statusKana">未开始</div>
      </a>

      <!-- 常用词 -->
      <a href="words.html" class="module-card" id="cardWords">
        <img src="icons/words-icon.png" alt="词汇" style="width:64px;height:64px;border-radius:12px;margin-bottom:15px;display:block;margin-left:auto;margin-right:auto;">
        <div class="module-name">常用词汇</div>
        <div class="module-desc">日语日常高频词汇罗马字输入练习</div>
        <div class="module-progress-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="bg" cx="40" cy="40" r="34"/>
            <circle class="fill" cx="40" cy="40" r="34"
              stroke-dasharray="213.6"
              stroke-dashoffset="213.6"
              id="ringWordsCircle"/>
          </svg>
          <span class="module-progress-text" id="textWordsPct">0%</span>
        </div>
        <div class="module-status" id="statusWords">未开始</div>
      </a>

      <!-- 常用句 -->
      <div class="module-card locked" id="cardSentences">
        <span class="module-icon">💬</span>
        <div class="module-name">日常会话</div>
        <div class="module-desc">常见日语句型罗马字输入，强化肌肉记忆</div>
        <div class="module-progress-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="bg" cx="40" cy="40" r="34"/>
            <circle class="fill" cx="40" cy="40" r="34"
              stroke-dasharray="213.6"
              stroke-dashoffset="213.6"/>
          </svg>
          <span class="module-progress-text">🔒</span>
        </div>
        <div class="module-status">敬请期待</div>
      </div>
    </div>

    <!-- 总体进度 -->
    <div class="overall-progress">
      <h3>📊 学习总览</h3>
      <div class="overall-bar">
        <div class="progress-bar" style="height: 14px;">
          <div class="progress-fill" id="overallFill" style="width: 0%"></div>
        </div>
        <span class="overall-percent" id="overallPercent">0%</span>
      </div>
      <div style="display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap;">
        <div style="color: var(--text-dim); font-size: 0.85rem;">
          ✅ 已掌握 <span id="statMastered" style="color: var(--success); font-weight: bold;">0</span> / 114 个假名
        </div>
        <div style="color: var(--text-dim); font-size: 0.85rem;">
          🎯 当前目标：完成五十音图
        </div>
      </div>
    </div>

    <div class="footer">
      <p>数据保存在本地 · <a href="kana.html" style="color: var(--primary);">前往练习 →</a></p>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    // ===== 全局模式切换 =====
    function setGlobalMode(mode) {
      localStorage.setItem('jtp_global_mode', mode);
      document.getElementById('btnBeginner').classList.toggle('active', mode === 'beginner');
      document.getElementById('btnAdvanced').classList.toggle('active', mode === 'advanced');
    }

    function initGlobalMode() {
      const mode = localStorage.getItem('jtp_global_mode') || 'beginner';
      document.getElementById('btnBeginner').classList.toggle('active', mode === 'beginner');
      document.getElementById('btnAdvanced').classList.toggle('active', mode === 'advanced');
    }

    // ===== 进度读取与展示 =====

    // 五十音各阶段总词条数（用于计算百分比）
    const STAGE_TOTALS = {
      seion: 46,
      dakuon: 25,
      youon: 36,
      sokuon: 7,
    };
    const KANA_TOTAL = Object.values(STAGE_TOTALS).reduce((a, b) => a + b, 0); // ≈ 114

    // 词汇总词条数（N5 + N4）
    const WORDS_TOTAL = 580; // N5约380 + N4约200

    function getStageProgress(stage) {
      const key = 'jtp_kana_' + stage;
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function countMastered(progress) {
      return Object.values(progress).filter(function(s) { return s.correct >= 3; }).length;
    }

    function renderKanaProgress() {
      const seion = getStageProgress('seion');
      const dakuon = getStageProgress('dakuon');
      const youon = getStageProgress('youon');
      const sokuon = getStageProgress('sokuon');

      const mastered =
        countMastered(seion) +
        countMastered(dakuon) +
        countMastered(youon) +
        countMastered(sokuon);

      const pct = Math.round((mastered / KANA_TOTAL) * 100);

      // 圆环进度
      const circumference = 2 * Math.PI * 34; // ≈ 213.6
      const offset = circumference - (pct / 100) * circumference;
      const circle = document.getElementById('ringKanaCircle');
      if (circle) {
        circle.style.strokeDashoffset = offset;
      }

      // 文字
      document.getElementById('textKanaPct').textContent = pct + '%';

      // 状态文字
      var statusEl = document.getElementById('statusKana');
      if (mastered === 0) {
        statusEl.textContent = '未开始';
        statusEl.className = 'module-status';
      } else if (pct === 100) {
        statusEl.textContent = '已全部掌握';
        statusEl.className = 'module-status done';
      } else {
        statusEl.textContent = '已掌握 ' + mastered + ' / ' + KANA_TOTAL;
        statusEl.className = 'module-status';
      }

      return mastered;
    }

    function renderWordsProgress() {
      // 读取各级别的词汇进度
      const levels = ['n5', 'n4'];
      let totalMastered = 0;
      let totalItems = 0;

      levels.forEach(function(level) {
        const key = 'jtp_words_' + level;
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            const data = JSON.parse(raw);
            const mastered = Object.values(data).filter(function(s) { return s.correct >= 3; }).length;
            totalMastered += mastered;
          }
        } catch (e) {}
      });

      // 估算总词条数（实际从data/words.js读取会更好，这里用估算值）
      const n5Count = 380;
      const n4Count = 200;
      totalItems = n5Count + n4Count;

      const pct = totalItems > 0 ? Math.round((totalMastered / totalItems) * 100) : 0;

      // 圆环进度
      const circumference = 2 * Math.PI * 34;
      const offset = circumference - (pct / 100) * circumference;
      const circle = document.getElementById('ringWordsCircle');
      if (circle) {
        circle.style.strokeDashoffset = offset;
      }

      // 文字
      const textEl = document.getElementById('textWordsPct');
      if (textEl) textEl.textContent = pct + '%';

      // 状态文字
      var statusEl = document.getElementById('statusWords');
      if (statusEl) {
        if (totalMastered === 0) {
          statusEl.textContent = '未开始';
          statusEl.className = 'module-status';
        } else if (pct === 100) {
          statusEl.textContent = '已全部掌握';
          statusEl.className = 'module-status done';
        } else {
          statusEl.textContent = '已掌握 ' + totalMastered + ' / ' + totalItems;
          statusEl.className = 'module-status';
        }
      }

      return totalMastered;
    }

    function renderOverallProgress() {
      const kanaMastered = renderKanaProgress();
      const wordsMastered = renderWordsProgress();

      // 计算总体进度（五十音权重更高）
      const kanaWeight = 114; // 五十音总词条
      const wordsWeight = 580; // 词汇总词条
      const totalWeight = kanaWeight + wordsWeight;
      const masteredWeight = kanaMastered + wordsMastered * 0.2; // 词汇进度权重减半（因为太多了）
      const overallPct = Math.round((masteredWeight / totalWeight) * 100);

      document.getElementById('overallFill').style.width = overallPct + '%';
      document.getElementById('overallPercent').textContent = overallPct + '%';
      document.getElementById('statMastered').textContent = kanaMastered;
    }

    // ===== 初始化 =====
    initGlobalMode();
    renderOverallProgress();
  </script>
</body>
</html>
